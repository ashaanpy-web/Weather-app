<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather app</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <style>
    /* Applying the refraction stroke to your p tag */
    .glass-text {
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1);
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }
  </style>
</head>

<body
  class="bg-[url('../images/bg.jpg')] bg-cover bg-center min-h-screen bg-no-repeat p-6 flex flex-col items-center justify-center">
  <div class="max-w-sm md:max-w-4xl lg:max-w-5xl mx-auto w-full flex flex-col gap-6">
    <div class="flex justify-between w-full">
      <div
        class="text-white mb-4 bg-white/10 border border-white/20 backdrop-blur-md shadow-2xl h-12 w-12 flex items-center justify-center rounded-full cursor-pointer hover:bg-white/20 transition-all hover:scale-105">
        <i class="fa-solid fa-bars text-xl"></i>
      </div>
      <div
        class="mb-4 hover:w-36 hover:bg-white/20 transition-all duration-300 text-white bg-white/10 border border-white/20 backdrop-blur-md shadow-2xl h-12 w-12 flex items-center justify-center rounded-full cursor-pointer overflow-hidden group">
        <i class="fa-solid fa-location-dot group-hover:hidden text-xl"></i>
        <span class="hidden group-hover:block text-sm font-semibold whitespace-nowrap px-3 tracking-wide">Change
          City</span>
      </div>
    </div>

    <div class="flex flex-col md:flex-row gap-6 w-full">
      <!-- Main Weather Box -->
      <div
        class="w-full md:w-1/2 lg:w-5/12 rounded-3xl border border-white/20 bg-white/10 p-8 shadow-2xl backdrop-blur-md flex flex-col items-center justify-center transition-transform hover:scale-[1.02]">
        <p
          class="glass-text text-8xl font-black tracking-tighter text-transparent bg-linear-to-b from-white/90 via-white/30 to-white/50 bg-clip-text drop-shadow-[0_2px_2px_rgba(255,255,255,0.4)]">
          25°
        </p>

        <div class="w-56 mt-4 drop-shadow-2xl">
          <img src="/images/weather.png" alt="Weather Status" class="w-full h-auto object-contain animate-float" />
        </div>
        <div class="mt-auto">
          <p
            class="city mt-6 text-4xl font-black tracking-tighter text-transparent bg-linear-to-b from-white/90 via-white/30 to-white/50 bg-clip-text drop-shadow-[0_2px_2px_rgba(255,255,255,0.4)] text-center">
            New York
          </p>
        </div>
      </div>

      <!-- Right Side Widgets -->
      <div class="w-full md:w-1/2 lg:w-7/12 flex flex-col gap-6">
        <div class="grid grid-cols-3 gap-4 w-full">
          <div
            class="bg-white/10 border border-white/20 backdrop-blur-md shadow-2xl py-6 rounded-3xl flex flex-col items-center justify-center transition-transform hover:scale-[1.05] cursor-default">
            <p class="text-white/70 text-sm font-semibold uppercase tracking-wider">Humidity</p>
            <p
              class="text-3xl mt-2 font-black tracking-tighter text-transparent bg-linear-to-b from-white/90 via-white/30 to-white/50 bg-clip-text drop-shadow-[0_2px_2px_rgba(255,255,255,0.4)]">
              25%
            </p>
          </div>
          <div
            class="bg-white/10 border border-white/20 backdrop-blur-md shadow-2xl py-6 rounded-3xl flex flex-col items-center justify-center transition-transform hover:scale-[1.05] cursor-default">
            <p class="text-white/70 text-sm font-semibold uppercase tracking-wider">Visibility</p>
            <p
              class="text-3xl mt-2 font-black tracking-tighter text-transparent bg-linear-to-b from-white/90 via-white/30 to-white/50 bg-clip-text drop-shadow-[0_2px_2px_rgba(255,255,255,0.4)]">
              15km
            </p>
          </div>
          <div
            class="bg-white/10 border border-white/20 backdrop-blur-md shadow-2xl py-6 rounded-3xl flex flex-col items-center justify-center transition-transform hover:scale-[1.05] cursor-default">
            <p class="text-white/70 text-sm font-semibold uppercase tracking-wider">Feels</p>
            <p
              class="text-3xl mt-2 font-black tracking-tighter text-transparent bg-linear-to-b from-white/90 via-white/30 to-white/50 bg-clip-text drop-shadow-[0_2px_2px_rgba(255,255,255,0.4)]">
              24°
            </p>
          </div>
        </div>

        <div
          class="w-full flex-1 rounded-3xl border border-white/20 bg-white/10 p-6 shadow-2xl backdrop-blur-xl transition-transform hover:scale-[1.02] flex flex-col justify-between">
          <h3 class="text-white/80 text-sm font-bold uppercase tracking-widest mb-4 ml-2">
            Hourly Forecast
          </h3>

          <!-- 3-Hour Report Scrollable Area -->
          <div
            class="flex gap-4 overflow-x-auto pb-4 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
            <!-- Single Hourly Item -->
            <div
              class="flex flex-col items-center min-w-[70px] py-3 rounded-2xl bg-white/10 border border-white/20 transition-colors hover:bg-white/20 cursor-pointer shadow-inner">
              <span class="text-xs font-semibold text-white/80">3 PM</span>
              <img src="/images/sun.png" class="w-10 h-10 my-2 drop-shadow-md" />
              <span class="text-xl font-bold text-white drop-shadow-md">26°</span>
            </div>

            <div
              class="flex flex-col items-center min-w-[70px] py-3 transition-colors hover:bg-white/20 cursor-pointer rounded-2xl border border-transparent hover:border-white/20">
              <span class="text-xs font-semibold text-white/60">6 PM</span>
              <i class="fa-solid fa-cloud text-white/80 my-3 text-3xl drop-shadow-md"></i>
              <span class="text-xl font-bold text-white/90">23°</span>
            </div>

            <div
              class="flex flex-col items-center min-w-[70px] py-3 transition-colors hover:bg-white/20 cursor-pointer rounded-2xl border border-transparent hover:border-white/20">
              <span class="text-xs font-semibold text-white/60">9 PM</span>
              <i class="fa-solid fa-moon text-white/80 my-3 text-3xl drop-shadow-md"></i>
              <span class="text-xl font-bold text-white/90">20°</span>
            </div>

            <div
              class="flex flex-col items-center min-w-[70px] py-3 transition-colors hover:bg-white/20 cursor-pointer rounded-2xl border border-transparent hover:border-white/20">
              <span class="text-xs font-semibold text-white/60">12 AM</span>
              <i class="fa-solid fa-cloud-moon text-white/80 my-3 text-3xl drop-shadow-md"></i>
              <span class="text-xl font-bold text-white/90">18°</span>
            </div>

            <div
              class="flex flex-col items-center min-w-[70px] py-3 transition-colors hover:bg-white/20 cursor-pointer rounded-2xl border border-transparent hover:border-white/20">
              <span class="text-xs font-semibold text-white/60">3 AM</span>
              <i class="fa-solid fa-cloud-showers-heavy text-white/80 my-3 text-3xl drop-shadow-md"></i>
              <span class="text-xl font-bold text-white/90">17°</span>
            </div>
          </div>

          <!-- Temperature Trend Graph (SVG) -->
          <div class="mt-4 pt-4 border-t border-white/10">
            <p class="text-xs font-semibold text-white/60 mb-2 ml-1 uppercase tracking-wider">Temperature Trend</p>
            <svg viewBox="0 0 400 100" class="w-full h-24 stroke-white/40 fill-transparent drop-shadow-lg">
              <path d="M0,80 Q50,20 100,50 T200,30 T300,70 T400,40" fill="none" stroke="url(#glassGradient)"
                stroke-width="4" stroke-linecap="round" />
              <defs>
                <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color: rgba(255, 255, 255, 0.2)" />
                  <stop offset="50%" style="stop-color: rgba(255, 255, 255, 1)" />
                  <stop offset="100%" style="stop-color: rgba(255, 255, 255, 0.2)" />
                </linearGradient>
              </defs>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>

</body>

</html>
